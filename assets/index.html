<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- css  -->
    <link rel="stylesheet" href="style.css">
    <!-- daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <!-- log in section  -->

    <section id="log-in" class="rounded-sm w-2/5 mx-auto my-6 flex flex-col items-center justify-center bg-slate-50">

        <!-- log in logo -->
        <div class="mb-8 text-center">
            <img class="mx-auto mt-8" src="./github-logo.png" alt="">
            <p class="mt-10">Sign in to manage your issues</p>
        </div>

        <!-- log in form -->
        <div>
            <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border">

                <label class="label">Username</label>
                <input id="user-id" type="text" class="input" placeholder="Enter Username" />
                <p class="text-blue-600">Default: admin</p>

                <label class="label">Password</label>
                <input id="user-password" type="password" class="input" placeholder="Password" />
                <p class="text-blue-600">Default: admin123</p>

                <button id="sign-in" class="btn btn-primary mt-4">Sign In</button>
            </fieldset>

            <!-- hr line -->
            <div class="flex items-center justify-between my-4">
                <hr class="flex-grow border-gray-400">
                <span>OR</span>
                <hr class="flex-grow border-gray-400">
            </div>
            <p class="text-center mb-4">Demo Credential:</p>
            <div class="bg-gray-100 flex flex-col text-center mb-6 rounded-sm py-2">
                <p>Username:admin</p>
                <p>Password: admin123</p>
            </div>
        </div>
        </div>
    </section>

    <!-- github issue tracker section -->

    <section id="issue-tracker" class="hidden">
        <section>

            <!-- navbar  -->
            <header class="mb-6 flex items-center justify-between mt-4 px-8 py-3 bg-gray-50">
                <!-- header left -->
                <div class="flex justify-start">
                    <div>
                        <img src="./github-logo.png" class="h-6" alt="">
                    </div>
                    <div>
                        <p class="font-bold ml-2">Github Issue Tracker</p>
                    </div>

                    <!-- header right -->
                </div>

                <div class="flex justify-end gap-2">
                    <div>
                        <input type="text" placeholder="Search Issues" class="rounded-sm px-2">
                    </div>
                    <div>
                        <button class="btn btn-primary rounded-sm px-2 h-6">+ New Issue</button>
                    </div>
                </div>
            </header>

            <!-- selector buttons -->

            <div class="flex gap-2 p-4 bg-slate-100 w-4/5 mx-auto rounded-sm">
                <button class="btn btn-primary px-3 py-1 w-25 rounded-sm" onclick="loadIssues()">All</button>
                <button class="btn btn-primary px-3 py-1 w-25 rounded-sm">Open</button>
                <button class="btn btn-primary px-3 py-1 w-25 rounded-sm">Closed</button>
            </div>

            <!-- count -->

            <div class="flex justify-between items-center p-4 bg-slate-100 w-4/5 mx-auto mt-4 rounded-sm">
                <div class="flex gap-2">
                    <div>
                        <img src="./Aperture.png" class="h-10" alt="">
                    </div>
                    <div>
                        <span class="font-bold">50</span>
                        <span class="font-bold">issues</span>
                        <p class="text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex gap-3">
                    <div><img src="./Open-Status.png" alt=""></div>
                    <div>Open</div>
                    <div><img src="./Closed- Status .png" alt=""></div>
                    <div>Closed</div>
                </div>

            </div>

        </section>

        <!-- issue container -->

        <section id="issues-container"
            class="bg-gray-50 p-10 w-4/5 mx-auto my-10 rounded-md grid grid-cols-1 gap-5 md:grid-cols-4 items-stretch">

        </section>

    </section>




    <script src="script.js"></script>
</body>

</html>
