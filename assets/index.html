<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- css  -->
    <link rel="stylesheet" href="style.css">
    <!-- daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <!-- log in form  -->
    <section id="log-in" class="rounded-sm w-2/5 mx-auto my-6 flex flex-col items-center justify-center bg-slate-50">
        <!-- log in logo -->
        <div class="mb-8 text-center">
            <img class="mx-auto mt-8" src="./github-logo.png" alt="">
            <p class="mt-10">Sign in to manage your issues</p>
        </div>

        <!-- log in form -->

        <div>
            <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border">

                <label class="label">Username</label>
                <input type="email" class="input" placeholder="Enter Username" />
                <p class="text-blue-600">Default: admin</p>

                <label class="label">Password</label>
                <input type="password" class="input" placeholder="Password" />
                <p class="text-blue-600">Default: admin123</p>

                <button class="btn btn-neutral mt-4 bg-blue-700">Sign In</button>
            </fieldset>

            <!-- hr line -->
            <div class="flex items-center justify-between my-4">
                <hr class="flex-grow border-gray-400">
                <span>OR</span>
                <hr class="flex-grow border-gray-400">
            </div>
            <p class="text-center mb-4">Demo Credential:</p>
            <div class="bg-gray-100 flex flex-col text-center mb-6 rounded-sm py-2">
                <p>Username:admin</p>
                <p>Password: admin123</p>
            </div>
        </div>
        </div>

    </section>




    <script src="script.js"></script>
</body>

</html>
